<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d29;
  --border: #2a2d3a;
  --text: #e4e6eb;
  --text2: #8b8fa3;
  --green: #00c853;
  --green-bg: rgba(0,200,83,.12);
  --red: #ff1744;
  --red-bg: rgba(255,23,68,.12);
  --blue: #448aff;
  --blue-bg: rgba(68,138,255,.12);
  --gold: #ffd740;
  --accent: #7c4dff;
  --orange: #ff9100;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI','Microsoft JhengHei',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
a { color:var(--blue); text-decoration:none; }
.container { max-width:1100px; margin:0 auto; padding:24px 16px; }
header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
header h1 { font-size:22px; font-weight:700; }
header h1 span { color:var(--accent); }
.meta { font-size:13px; color:var(--text2); }
.meta .time { color:var(--gold); font-weight:600; }

.tabs { display:flex; gap:6px; margin-bottom:24px; flex-wrap:wrap; }
.tab { padding:8px 20px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--text2); transition:all .2s; }
.tab:hover { border-color:var(--accent); color:var(--text); }
.tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.tab-content { display:none; }
.tab-content.active { display:block; }

.summary-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:28px; }
.summary-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
.summary-card .label { font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.summary-card .value { font-size:24px; font-weight:700; }
.summary-card .sub { font-size:13px; color:var(--text2); margin-top:4px; }

.section-title { font-size:17px; font-weight:700; margin:28px 0 14px; display:flex; align-items:center; gap:8px; }
.badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:600; display:inline-block; }
.badge-tw { background:#ff6f00; color:#fff; }
.badge-us { background:#1565c0; color:#fff; }
.badge-watch { background:#6a1b9a; color:#fff; }

.stock-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; margin-bottom:10px; }
.stock-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; transition:border-color .2s; }
.stock-card:hover { border-color:var(--accent); }
.stock-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.stock-name { font-size:15px; font-weight:700; }
.stock-symbol { font-size:12px; color:var(--text2); }
.stock-price { font-size:24px; font-weight:700; text-align:right; }
.stock-change { font-size:13px; font-weight:600; text-align:right; }
.stock-details { display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.detail-item { display:flex; justify-content:space-between; font-size:12px; }
.detail-label { color:var(--text2); }
.detail-value { font-weight:600; }

.up { color:var(--red); }
.down { color:var(--green); }
.tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:6px; font-weight:600; margin-left:6px; }
.tag-profit { background:var(--green-bg); color:var(--green); }
.tag-loss { background:var(--red-bg); color:var(--red); }

.loading { text-align:center; padding:60px; color:var(--text2); font-size:16px; }
.spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin-right:10px; vertical-align:middle; }
@keyframes spin { to{transform:rotate(360deg);} }
.error-msg { background:var(--red-bg); color:var(--red); padding:16px; border-radius:8px; margin:20px 0; }

/* Report styles */
.report { line-height:1.8; }
.report h2 { color:var(--accent); font-size:18px; margin:28px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--accent); }
.report h3 { color:var(--blue); font-size:15px; margin:20px 0 8px; }
.report table { width:100%; border-collapse:collapse; margin:12px 0 20px; font-size:13px; }
.report th { background:var(--accent); color:#fff; padding:10px 12px; text-align:left; font-size:12px; }
.report td { padding:8px 12px; border-bottom:1px solid var(--border); }
.report tr:hover { background:rgba(124,77,255,.06); }
.report .callout { background:var(--card); border-left:4px solid var(--accent); padding:14px 18px; margin:14px 0; border-radius:0 8px 8px 0; }
.report .callout-warn { border-left-color:var(--orange); }
.report .callout-green { border-left-color:var(--green); }
.report ul, .report ol { padding-left:20px; }
.report li { margin-bottom:6px; }
.r-up { color:var(--red); font-weight:700; }
.r-dn { color:var(--green); font-weight:700; }
.r-tag { display:inline-block; font-size:11px; padding:2px 10px; border-radius:10px; font-weight:700; }
.r-tag-a { background:#7c4dff33; color:var(--accent); }
.r-tag-b { background:var(--blue-bg); color:var(--blue); }
.r-tag-c { background:var(--red-bg); color:var(--red); }

.footer { text-align:center; padding:30px 0 10px; color:var(--text2); font-size:12px; border-top:1px solid var(--border); margin-top:40px; }
@media(max-width:600px) {
  .stock-grid { grid-template-columns:1fr; }
  .summary-row { grid-template-columns:1fr 1fr; }
  header h1 { font-size:18px; }
  .report table { font-size:11px; }
  .report th, .report td { padding:6px 8px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span>Stock</span> Dashboard</h1>
    <div class="meta">
      <div>最後更新：<span class="time" id="update-time">載入中...</span></div>
      <div id="update-utc"></div>
      <div style="margin-top:10px;"><a href="report-portfolio-20260420.html" style="color:var(--gold);font-weight:600;">持股策略與分析師參考（HTML 報告）</a></div>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="dashboard">持股總覽</div>
    <div class="tab" data-tab="report">策略報告</div>
  </div>

  <div id="tab-dashboard" class="tab-content active">
    <div class="summary-row" id="summary-row">
      <div class="summary-card"><div class="label">載入中</div><div class="value"><span class="spinner"></span></div></div>
    </div>
    <div id="content">
      <div class="loading"><span class="spinner"></span>正在載入股票數據...</div>
    </div>
  </div>

  <div id="tab-report" class="tab-content">
    <div class="report" id="report-content"></div>
  </div>

  <div class="footer">
    <p>Data powered by Yahoo Finance via GitHub Actions</p>
    <p>Auto-updated daily after TW & US market close</p>
  </div>
</div>

<script>
const DATA_URL = 'data/stocks.json';

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  });
});

function fmt(n,d=2){ return n==null?'—':Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtInt(n){ return n==null?'—':Number(n).toLocaleString('en-US'); }
function fmtCap(n){ if(!n)return'—'; if(n>=1e12)return(n/1e12).toFixed(2)+'T'; if(n>=1e9)return(n/1e9).toFixed(2)+'B'; if(n>=1e6)return(n/1e6).toFixed(0)+'M'; return fmtInt(n); }
function sign(n){ return n>0?'+':''; }
function cls(n){ return n>=0?'up':'down'; }

function renderSummary(data) {
  const s = data.summary;
  const usVal = s.us_total_value || 0;
  const usCost = s.us_total_cost || 0;
  const usPnl = s.us_total_pnl || 0;
  document.getElementById('summary-row').innerHTML = `
    <div class="summary-card">
      <div class="label">台股持股</div>
      <div class="value ${cls(s.tw_avg_pnl_pct)}">${sign(s.tw_avg_pnl_pct)}${fmt(s.tw_avg_pnl_pct)}%</div>
      <div class="sub">獲利 ${s.tw_winners} / 虧損 ${s.tw_losers}</div>
    </div>
    <div class="summary-card">
      <div class="label">美股損益</div>
      <div class="value ${cls(s.us_avg_pnl_pct)}">${sign(s.us_avg_pnl_pct)}${fmt(s.us_avg_pnl_pct)}%</div>
      <div class="sub">${sign(usPnl)}$${fmt(usPnl)} · 獲利 ${s.us_winners} / 虧損 ${s.us_losers}</div>
    </div>
    <div class="summary-card">
      <div class="label">美股總成本</div>
      <div class="value">$${fmt(usCost)}</div>
      <div class="sub">現值 $${fmt(usVal)}</div>
    </div>
    <div class="summary-card">
      <div class="label">持股／觀察</div>
      <div class="value">${data.tw_stocks.length + data.us_stocks.length} / ${data.watchlist.length}</div>
      <div class="sub">台${data.tw_stocks.length} + 美${data.us_stocks.length} + 觀察${data.watchlist.length}</div>
    </div>`;
}

function stockCard(s) {
  const hasPnl = s.pnl != null;
  const cur = s.currency==='TWD'?'':'$';
  const chgCls = s.change>=0?'up':'down';
  const pnlCls = hasPnl?(s.pnl>=0?'tag-profit':'tag-loss'):'';
  const pnlTag = hasPnl?`<span class="tag ${pnlCls}">${sign(s.pnl_pct)}${fmt(s.pnl_pct)}%</span>`:'';

  if(s.error) return `<div class="stock-card"><div class="stock-header"><div><div class="stock-name">${s.name}</div><div class="stock-symbol">${s.symbol}</div></div></div><div class="error-msg">無法取得: ${s.error}</div></div>`;

  let d = '';
  if(hasPnl) {
    d += `<div class="detail-item"><span class="detail-label">買入價</span><span class="detail-value">${cur}${fmt(s.buy_price)}</span></div>`;
    if(s.shares) d += `<div class="detail-item"><span class="detail-label">股數</span><span class="detail-value">${fmtInt(s.shares)}</span></div>`;
    d += `<div class="detail-item"><span class="detail-label">成本</span><span class="detail-value">${cur}${fmt(s.cost||s.buy_price)}</span></div>`;
    d += `<div class="detail-item"><span class="detail-label">總損益</span><span class="detail-value ${cls(s.pnl_total||s.pnl)}">${sign(s.pnl_total||s.pnl)}${cur}${fmt(s.pnl_total||s.pnl)}</span></div>`;
  }
  d += `<div class="detail-item"><span class="detail-label">日區間</span><span class="detail-value">${cur}${fmt(s.low)}-${cur}${fmt(s.high)}</span></div>`;
  d += `<div class="detail-item"><span class="detail-label">成交量</span><span class="detail-value">${fmtInt(s.volume)}</span></div>`;
  d += `<div class="detail-item"><span class="detail-label">EPS</span><span class="detail-value">${s.eps!=null?fmt(s.eps):'—'}</span></div>`;
  d += `<div class="detail-item"><span class="detail-label">市值</span><span class="detail-value">${fmtCap(s.market_cap)}</span></div>`;

  return `<div class="stock-card">
    <div class="stock-header">
      <div><div class="stock-name">${s.name} ${pnlTag}</div><div class="stock-symbol">${s.symbol} · ${s.last_date||''}</div></div>
      <div><div class="stock-price">${cur}${fmt(s.close)}</div><div class="stock-change ${chgCls}">${sign(s.change)}${cur}${fmt(s.change)} (${sign(s.change_pct)}${fmt(s.change_pct)}%)</div></div>
    </div>
    <div class="stock-details">${d}</div>
  </div>`;
}

function renderStocks(data) {
  let h = '';
  h += `<div class="section-title"><span class="badge badge-tw">TW</span> 台股持股</div><div class="stock-grid">${data.tw_stocks.map(stockCard).join('')}</div>`;
  h += `<div class="section-title"><span class="badge badge-us">US</span> 美股持股</div><div class="stock-grid">${data.us_stocks.map(stockCard).join('')}</div>`;
  h += `<div class="section-title"><span class="badge badge-watch">WATCH</span> 觀察清單</div><div class="stock-grid">${data.watchlist.map(stockCard).join('')}</div>`;
  document.getElementById('content').innerHTML = h;
}

async function renderReport() {
  const el = document.getElementById('report-content');
  try {
    const resp = await fetch('data/report.html?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    el.innerHTML = await resp.text();
  } catch(e) {
    el.innerHTML = '<div class="callout callout-warn">策略報告尚未生成或載入失敗：' + e.message + '<br>請觸發 Cursor 的 <code>每日報告</code> 指令來產生最新報告。</div>';
  }
}

async function loadData() {
  try {
    const resp = await fetch(DATA_URL + '?t=' + Date.now());
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    document.getElementById('update-time').textContent = data.updated_at + ' (台灣時間)';
    document.getElementById('update-utc').textContent = 'UTC: ' + data.updated_at_utc;
    renderSummary(data);
    renderStocks(data);
    renderReport();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="error-msg">載入失敗：${e.message}<br>請確認 data/stocks.json 是否存在。首次部署需手動觸發一次 GitHub Action。</div>`;
  }
}
loadData();
</script>
</body>
</html>
