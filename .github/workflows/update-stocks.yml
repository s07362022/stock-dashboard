name: Daily Stock Update

on:
  schedule:
    # 每天台灣時間 06:30 (UTC 22:30) — 美股收盤後
    - cron: '30 22 * * 1-5'
    # 每天台灣時間 14:30 (UTC 06:30) — 台股收盤後
    - cron: '30 6 * * 1-5'
  workflow_dispatch:  # 支援手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch stock data
        run: python scripts/update_data.py

      - name: Commit and push
        run: |
          git config user.name "Stock Bot"
          git config user.email "stock-bot@github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "update: stock data $(date -u +%Y-%m-%d_%H:%M)"
          git push
