name: Daily Stock Update

on:
  # ⚠️ 自動排程已停用 (2026-05-12)
  # update_data.py 只含舊版假持倉（5 key），會破壞 dashboard (23 key)。
  # 正確更新方式：本機執行 python scripts/build_stocks_json.py → git push
  # schedule:
  #   - cron: '30 22 * * 1-5'   # 台灣時間 06:30
  #   - cron: '30 6 * * 1-5'    # 台灣時間 14:30
  workflow_dispatch:  # 保留手動觸發（測試用，勿輕易啟用）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch stock data
        run: |
          echo "⚠️  WARNING: update_data.py 只含舊版假持倉，僅供參考，不寫入 stocks.json"
          echo "正確更新請用本機 python scripts/build_stocks_json.py"
          # python scripts/update_data.py  ← 已停用

      - name: Commit and push
        run: |
          git config user.name "Stock Bot"
          git config user.email "stock-bot@github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "update: stock data $(date -u +%Y-%m-%d_%H:%M)"
          git push
